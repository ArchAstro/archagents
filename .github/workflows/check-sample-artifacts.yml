name: check-sample-artifacts

# Two jobs:
#   - tests: runs the generator's unit tests
#   - drift: runs the generator with --check, fails if any committed
#     artifact (deploy.sh, .aaignore, samples.json) doesn't match what
#     the generator would produce from the current sample.yaml files.
#     Forces authors to regenerate locally before merging.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned to defend against tag mutability — match the convention
      # used by check-plugin-content.yml. Bump deliberately.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Pinned to match the version used by the existing plugin generator
        # (see .github/workflows/check-plugin-content.yml).
        run: pip install pyyaml==6.0.2

      - name: Run unit tests
        run: python3 scripts/test_generate_sample_artifacts.py

  drift:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml==6.0.2

      - name: Check generated artifacts are up to date
        run: python3 scripts/generate_sample_artifacts.py --check
