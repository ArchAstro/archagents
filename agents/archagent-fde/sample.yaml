# sample.yaml is the source of truth for this sample's catalog metadata
# and deploy sequence. Edit it, then run:
#
#   python3 scripts/generate_sample_artifacts.py
#
# to regenerate committed artifacts. CI fails if this file changes
# without the generated artifacts being regenerated in the same PR.
#
# Users install this sample with:
#
#   archastro install agentsample archagent-fde
#
# which streams the release tarball and runs the `steps:` block below
# against the caller's app.

schema_version: 2

# Bump this to cut a new per-sample release.
version: v0.2.0

name: "ArchAgents FDE (Forward Deployed Engineer)"
tagline: "A Forward Deployed Engineer for ArchAgents teams that sets up new customers end-to-end."

# The DSL executor (+ `install agentsample` command) ship in 0.28.0.
min_cli_version: "0.28.0"

# Deploy steps. The skills under skills/ get uploaded as Skill + File
# configs keyed by their bare directory name so agent.yaml's
# `skills: [{config_ref: <slug>}]` references resolve cleanly.
steps:
  - type: upload_scripts
    source_dir: scripts
  - type: upload_skills
    source_dir: skills
  - type: deploy_agent
    template_file: agent.yaml
